
[tasks.env_check]
dependencies = ["echo_env", "install_flutter_protobuf"]
condition = { env_set = [
  "BUILD_FLAG",
  "RUST_COMPILE_TARGET",
  "CRATE_TYPE",
  "TARGET_OS",
], channels = [
  "stable",
] }

[tasks.appflowy-core-dev-ios]
category = "Build"
dependencies = ["env_check", "set-app-version"]
run_task = { name = [
  "setup-crate-type",
  "sdk-build-ios",
  "post-mobile-ios",
  "restore-crate-type",
] }

[tasks.sdk-build-ios]
dependencies = ["set-app-version"]
private = true
script = [
  """
    cd rust-lib/
    
    # Set environment variables for iOS simulator builds to fix bindgen issues
    # This prevents the "stdbool.h file not found" error when building for iOS simulator
    # Fix the issue:
    # error: version 'sim' in target triple 'arm64-apple-ios-sim' is invalid
    # rocksdb/include/rocksdb/c.h:65:10: fatal error: 'stdbool.h' file not found
    #

    if [[ "${RUST_COMPILE_TARGET}" == *"ios-sim"* ]]; then
      echo "🔧 Setting up environment for iOS Simulator build..."
      export SDKROOT="$(xcrun --sdk iphonesimulator --show-sdk-path)"
      export BINDGEN_EXTRA_CLANG_ARGS="-target arm64-apple-ios14.0-simulator -isysroot $(xcrun --sdk iphonesimulator --show-sdk-path)"
      echo "📱 SDKROOT: $SDKROOT"
      echo "🛠️  BINDGEN_EXTRA_CLANG_ARGS: $BINDGEN_EXTRA_CLANG_ARGS"
    fi
    
    if [ "${BUILD_FLAG}" = "debug" ]; then
      echo "🚀 🚀 🚀  Building iOS SDK for debug"
      cargo lipo --targets ${RUST_COMPILE_TARGET} --features "${FLUTTER_DESKTOP_FEATURES}" --package=dart-ffi
    else
      echo "🚀 🚀 🚀  Building iOS SDK  for release"
      cargo lipo --release --targets ${RUST_COMPILE_TARGET} --features "${FLUTTER_DESKTOP_FEATURES}" --package=dart-ffi
    fi
    cd ../
  """,
]
script_runner = "@shell"

[tasks.appflowy-core-dev-android]
category = "Build"
dependencies = ["env_check", "set-app-version"]
run_task = { name = [
  "setup-crate-type",
  "sdk-build-android-all",
  "post-mobile-android-multiarch",
  "restore-crate-type",
] }

# only use in CI job
[tasks.appflowy-core-dev-android-ci]
category = "Build"
dependencies = ["env_check", "set-app-version"]
run_task = { name = [
  "setup-crate-type",
  "sdk-build-android-ci",
  "post-mobile-android",
  "restore-crate-type",
] }

[tasks.sdk-build-android]
private = true
script = [
  """
    echo Building Android ARM64 (arm64-v8a)...
    cd rust-lib
    exec cargo ndk -t arm64-v8a -o ./jniLibs build --package dart-ffi --features "${FLUTTER_DESKTOP_FEATURES}"
    cd ..
    echo ARM64 cargo build done.
  """,
]
script_runner = "@duckscript"

[tasks.sdk-build-android-x86_64]
private = true
script = [
  """
    echo Building Android x86_64 (x86_64)...
    cd rust-lib
    exec cargo ndk -t x86_64 -o ./jniLibs_x86_64 build --package dart-ffi --features "${FLUTTER_DESKTOP_FEATURES}"
    cd ..
    echo x86_64 cargo build done.
  """,
]
script_runner = "@duckscript"

# 清理 Android 交叉编译的增量缓存（只删 incremental，保留 deps 以复用已编译依赖）
[tasks.clean-android-incremental-cache]
private = true
script = [
  """
    echo "🧹 Cleaning Android incremental build cache..."
    arm64_inc = set ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/target/aarch64-linux-android/debug/incremental
    x86_64_inc = set ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/target/x86_64-linux-android/debug/incremental
    if is_dir ${arm64_inc}
        rm -r ${arm64_inc}
        echo "  Removed aarch64-linux-android incremental cache"
    end
    if is_dir ${x86_64_inc}
        rm -r ${x86_64_inc}
        echo "  Removed x86_64-linux-android incremental cache"
    end
    echo "Done."
  """,
]
script_runner = "@duckscript"

# Builds both arm64-v8a AND x86_64 in parallel for emulator + real device support
[tasks.sdk-build-android-all]
dependencies = ["set-app-version", "clean-android-incremental-cache"]
run_task = { name = ["sdk-build-android", "sdk-build-android-x86_64"] }

# only use in CI job
[tasks.sdk-build-android-ci]
dependencies = ["set-app-version"]
private = true
script = [
  """
    cd rust-lib/
    cargo ndk -t arm64-v8a -t armeabi-v7a -o ./jniLibs build --package dart-ffi --features "${FLUTTER_DESKTOP_FEATURES}"
    cd ../
  """,
]
script_runner = "@shell"

[tasks.post-mobile-ios]
private = true
script = [
  """
    echo "🚀 🚀 🚀  AppFlowy-Core for iOS platform build success"
    dart_ffi_dir= set ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/appflowy_flutter/packages/appflowy_backend/${TARGET_OS}
    lib = set lib${LIB_NAME}.${LIB_EXT}

    echo "💻 💻 💻  Copying ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/target/${RUST_COMPILE_TARGET}/${BUILD_FLAG}/${lib} to ${dart_ffi_dir}/${lib}"
    rm -f ${dart_ffi_dir}/${lib}
    cp ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/target/${RUST_COMPILE_TARGET}/${BUILD_FLAG}/${lib} \
    ${dart_ffi_dir}/${lib}

    echo "💻 💻 💻  Copying ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/${CARGO_MAKE_CRATE_NAME}/binding.h to ${dart_ffi_dir}/Classes/binding.h"
    rm -f ${dart_ffi_dir}/Classes/binding.h
    cp ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/${CARGO_MAKE_CRATE_NAME}/binding.h \
    ${dart_ffi_dir}/Classes/binding.h
  """,
]
script_runner = "@duckscript"

[tasks.post-mobile-android]
script = [
  """
    echo "🚀 🚀 🚀  AppFlowy-Core for Android platform build success"
    dart_ffi_dir= set ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/appflowy_flutter/android/app/src/main
    lib = set lib${LIB_NAME}.${LIB_EXT}

    echo "💻 💻 💻  Copying ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/jniLibs/ to ${dart_ffi_dir}/"
    rm -r ${dart_ffi_dir}/jniLibs
    cp ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/jniLibs/ \
    ${dart_ffi_dir}/

    echo "💻 💻 💻  Copying ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/${CARGO_MAKE_CRATE_NAME}/binding.h to ${dart_ffi_dir}/Classes/binding.h"
    rm -f ${dart_ffi_dir}/Classes/binding.h
    cp ${CARGO_MAKE_WORKSPACE_WORKING_DIRECTORY}/rust-lib/${CARGO_MAKE_CRATE_NAME}/binding.h \
    ${dart_ffi_dir}/Classes/binding.h
  """,
]
script_runner = "@duckscript"

# Multi-arch version: copies both arm64-v8a AND x86_64 to Flutter project
[tasks.post-mobile-android-multiarch]
script = [
  """
    echo AppFlowy-Core multi-arch copy start
    exec powershell -ExecutionPolicy Bypass -File rust-lib/copy_android_libs.ps1
    echo AppFlowy-Core multi-arch copy done
  """,
]
script_runner = "@duckscript"
