<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excalidraw Flutter Bridge</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #excalidraw-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Excalidraw iframe -->
    <iframe id="excalidraw-iframe" src="index.html"></iframe>
    
    <script>
        // Flutter Bridge for Excalidraw
        // 这个文件作为 InAppWebView 和 Excalidraw iframe 之间的桥梁
        
        console.log('[Flutter Bridge] 🌉 Initializing bridge...');
        
        const iframe = document.getElementById('excalidraw-iframe');
        let currentViewId = null;
        
        // 从 URL 参数获取 viewId
        function getViewIdFromUrl() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('viewId') || urlParams.get('view_id') || null;
            } catch (e) {
                console.error('[Flutter Bridge] Error getting viewId:', e);
                return null;
            }
        }
        
        currentViewId = getViewIdFromUrl();
        console.log('[Flutter Bridge] 📍 Current viewId:', currentViewId);
        
        // 监听来自 Excalidraw iframe 的消息
        window.addEventListener('message', function(event) {
            // 只处理来自 iframe 的消息
            if (event.source !== iframe.contentWindow) {
                return;
            }
            
            const message = event.data;
            console.log('[Flutter Bridge] 📨 Received message from iframe:', message.type);
            
            // 转发消息到 Flutter
            if (window.ExcalidrawBridge) {
                try {
                    // 添加 viewId 到消息中
                    if (message.data && typeof message.data === 'object') {
                        message.data.viewId = currentViewId;
                    }
                    
                    // 将消息转换为 JSON 字符串并发送到 Flutter
                    const jsonMessage = JSON.stringify({
                        type: message.type,
                        payload: message.data
                    });
                    
                    console.log('[Flutter Bridge] 📤 Forwarding to Flutter:', message.type);
                    window.ExcalidrawBridge.postMessage(jsonMessage);
                } catch (e) {
                    console.error('[Flutter Bridge] Error forwarding message to Flutter:', e);
                }
            } else {
                console.warn('[Flutter Bridge] ⚠️ ExcalidrawBridge not available');
            }
        });
        
        // 暴露全局函数供 Flutter 调用
        window.loadExcalidrawData = function(data) {
            console.log('[Flutter Bridge] 📥 loadExcalidrawData called from Flutter');
            console.log('[Flutter Bridge] Data keys:', data ? Object.keys(data) : 'null');
            
            // 转发到 iframe
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'load-data',
                    data: data
                }, '*');
                console.log('[Flutter Bridge] ✅ Data forwarded to iframe');
            } else {
                console.error('[Flutter Bridge] ❌ iframe not ready');
            }
        };
        
        window.getExcalidrawData = function() {
            console.log('[Flutter Bridge] 📤 getExcalidrawData called from Flutter');
            
            // 请求 iframe 发送当前数据
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'get-data'
                }, '*');
                console.log('[Flutter Bridge] ✅ Data request sent to iframe');
            } else {
                console.error('[Flutter Bridge] ❌ iframe not ready');
            }
        };
        
        window.setTheme = function(theme) {
            console.log('[Flutter Bridge] 🎨 setTheme called from Flutter:', theme);
            
            // 转发到 iframe
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'set-theme',
                    data: { theme: theme }
                }, '*');
                console.log('[Flutter Bridge] ✅ Theme forwarded to iframe');
            } else {
                console.error('[Flutter Bridge] ❌ iframe not ready');
            }
        };
        
        window.exportExcalidraw = function(format) {
            console.log('[Flutter Bridge] 📤 exportExcalidraw called from Flutter:', format);
            
            // 转发到 iframe
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'export',
                    data: { format: format }
                }, '*');
                console.log('[Flutter Bridge] ✅ Export request forwarded to iframe');
            } else {
                console.error('[Flutter Bridge] ❌ iframe not ready');
            }
        };
        
        window.clearCanvas = function() {
            console.log('[Flutter Bridge] 🗑️ clearCanvas called from Flutter');
            
            // 转发到 iframe
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'clear-canvas'
                }, '*');
                console.log('[Flutter Bridge] ✅ Clear canvas request forwarded to iframe');
            } else {
                console.error('[Flutter Bridge] ❌ iframe not ready');
            }
        };
        
        window.undo = function() {
            console.log('[Flutter Bridge] ↶ undo called from Flutter');
            
            // 转发到 iframe
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'undo'
                }, '*');
                console.log('[Flutter Bridge] ✅ Undo request forwarded to iframe');
            } else {
                console.error('[Flutter Bridge] ❌ iframe not ready');
            }
        };
        
        window.redo = function() {
            console.log('[Flutter Bridge] ↷ redo called from Flutter');
            
            // 转发到 iframe
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'redo'
                }, '*');
                console.log('[Flutter Bridge] ✅ Redo request forwarded to iframe');
            } else {
                console.error('[Flutter Bridge] ❌ iframe not ready');
            }
        };
        
        // 等待 iframe 加载完成
        iframe.addEventListener('load', function() {
            console.log('[Flutter Bridge] ✅ iframe loaded');
            
            // 通知 Flutter 桥接已就绪
            if (window.ExcalidrawBridge) {
                try {
                    const message = JSON.stringify({
                        type: 'ready',
                        payload: { viewId: currentViewId }
                    });
                    window.ExcalidrawBridge.postMessage(message);
                    console.log('[Flutter Bridge] ✅ Ready notification sent to Flutter');
                } catch (e) {
                    console.error('[Flutter Bridge] Error sending ready notification:', e);
                }
            }
        });
        
        console.log('[Flutter Bridge] ✅ Bridge initialized');
    </script>
</body>
</html>
