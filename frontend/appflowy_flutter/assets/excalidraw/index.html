    // ========================================================================
    // PonyNotes: localStorage 隔离 - 必须在所有其他脚本之前执行！
    // ========================================================================
    // 目的：让每个白板视图(viewId)使用独立的localStorage命名空间
    // 原理：拦截localStorage API，自动添加viewId前缀
    // ========================================================================
    (function() {
      console.log('[PonyNotes] 🔐 Initializing localStorage isolation...');
      
      // 从URL路径提取viewId（格式：http://127.0.0.1:xxxx/whiteboard/{viewId}/index.html）
      let currentViewId = null;
      try {
        const pathParts = window.location.pathname.split('/');
        const whiteboardIndex = pathParts.findIndex(p => p === 'whiteboard');
        if (whiteboardIndex >= 0 && whiteboardIndex + 1 < pathParts.length) {
          currentViewId = pathParts[whiteboardIndex + 1];
        }
      } catch (e) {
        console.error('[PonyNotes] Failed to extract viewId from URL:', e);
      }
      
      console.log('[PonyNotes] 🆔 Current viewId:', currentViewId || 'unknown');
      
      // 保存原始localStorage的引用
      const originalLocalStorage = window.localStorage;
      const _internalStorage = {};
      
      // 生成带viewId前缀的key
      function getPrefixedKey(key) {
        if (currentViewId) {
          return `whiteboard_${currentViewId}_${key}`;
        }
        return `whiteboard_unknown_${key}`;
      }
      
      // 🔑 定义全局消息发送函数（供localStorage使用）
      function sendToParent(type, payload) {
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: type,
              payload: payload
            }, '*');
          }
        } catch (e) {
          console.error('[PonyNotes Storage] ❌ Error sending message to parent:', e);
        }
      }
      
      // 创建隔离的localStorage代理
      const isolatedStorage = {
        getItem: function(key) {
          const prefixedKey = getPrefixedKey(key);
          const value = originalLocalStorage.getItem(prefixedKey);
          console.log(`[PonyNotes Storage] getItem("${key}") -> prefixed: "${prefixedKey}" -> ${value ? 'HAS_DATA' : 'null'}`);
          return value;
        },
        
        setItem: function(key, value) {
          const prefixedKey = getPrefixedKey(key);
          console.log(`[PonyNotes Storage] 🔥🔥🔥 setItem("${key}") -> prefixed: "${prefixedKey}", value length: ${value ? value.length : 0}`);
          originalLocalStorage.setItem(prefixedKey, value);
          
          // 🚀 关键修复：立即通知 Flutter 数据已变化
          // ⚠️ 监听所有 key，不只是 excalidraw 开头的！
          console.log(`[PonyNotes Storage] 🔍 Checking key "${key}"`);
          
          // 🔥 尝试解析并发送所有可能包含 elements 的数据
          try {
            // 尝试解析数据
            const parsedData = JSON.parse(value);
            
            // 🔍 检查数据是否包含 elements 数组（这是 Excalidraw 数据的标志）
            if (parsedData && typeof parsedData === 'object') {
              const hasElements = Array.isArray(parsedData.elements);
              const hasAppState = parsedData.appState && typeof parsedData.appState === 'object';
              const elementsCount = hasElements ? parsedData.elements.length : 0;
              
              console.log(`[PonyNotes Storage] 🔍 Parsed data - hasElements: ${hasElements}, elementsCount: ${elementsCount}, hasAppState: ${hasAppState}`);
              
              // 🔥 如果有 elements 字段，就认为这是 Excalidraw 数据，立即发送！
              if (hasElements) {
                console.log(`[PonyNotes Storage] 🚀 FOUND EXCALIDRAW DATA! Key: "${key}", elements: ${elementsCount}`);
                
                // 添加 viewId
                if (currentViewId) {
                  parsedData.viewId = currentViewId;
                }
                
                // 立即发送 excalidraw-change 消息
                sendToParent('excalidraw-change', parsedData);
                
                sendToParent('debug-log', {
                  level: 'info',
                  message: `[PonyNotes Storage] ✅ Sent excalidraw-change for key "${key}", elements: ${elementsCount}`
                });
                
                console.log(`[PonyNotes Storage] ✅ Sent excalidraw-change to parent, key: "${key}", elements: ${elementsCount}`);
              } else {
                console.log(`[PonyNotes Storage] ℹ️ Key "${key}" has no elements array, skipping`);
              }
            }
          } catch (parseError) {
            // 如果不是 JSON，忽略（可能是字符串数据）
            console.log(`[PonyNotes Storage] ℹ️ Key "${key}" is not JSON, skipping`);
          }
        },
        
        removeItem: function(key) {
          const prefixedKey = getPrefixedKey(key);
          console.log(`[PonyNotes Storage] removeItem("${key}") -> prefixed: "${prefixedKey}"`);
          originalLocalStorage.removeItem(prefixedKey);
        },
        
        clear: function() {
          console.log(`[PonyNotes Storage] clear() - clearing only keys for viewId: ${currentViewId}`);
          // 只清除当前viewId的键
          const prefix = currentViewId ? `whiteboard_${currentViewId}_` : 'whiteboard_unknown_';
          const keysToRemove = [];
          for (let i = 0; i < originalLocalStorage.length; i++) {
            const key = originalLocalStorage.key(i);
            if (key && key.startsWith(prefix)) {
              keysToRemove.push(key);
            }
          }
          keysToRemove.forEach(key => originalLocalStorage.removeItem(key));
          console.log(`[PonyNotes Storage] Cleared ${keysToRemove.length} keys`);
        },
        
        key: function(index) {
          // 只返回当前viewId的键
          const prefix = currentViewId ? `whiteboard_${currentViewId}_` : 'whiteboard_unknown_';
          const keys = [];
          for (let i = 0; i < originalLocalStorage.length; i++) {
            const key = originalLocalStorage.key(i);
            if (key && key.startsWith(prefix)) {
              // 去掉前缀返回原始key名
              keys.push(key.substring(prefix.length));
            }
          }
          return keys[index] || null;
        },
        
        get length() {
          // 只计算当前viewId的键数量
          const prefix = currentViewId ? `whiteboard_${currentViewId}_` : 'whiteboard_unknown_';
          let count = 0;
          for (let i = 0; i < originalLocalStorage.length; i++) {
            const key = originalLocalStorage.key(i);
            if (key && key.startsWith(prefix)) {
              count++;
            }
          }
          return count;
        }
      };
      
      // 🔑 关键：用隔离的storage替换window.localStorage
      try {
        Object.defineProperty(window, 'localStorage', {
          get: function() {
            return isolatedStorage;
          },
          configurable: false
        });
        console.log('[PonyNotes] ✅ localStorage isolation installed successfully!');
        console.log('[PonyNotes] 🔐 All localStorage operations will be scoped to viewId:', currentViewId);
      } catch (e) {
        console.error('[PonyNotes] ❌ Failed to install localStorage isolation:', e);
      }
      
      // 导出函数供后续使用
      window._ponyNotesSetViewId = function(newViewId) {
        console.log('[PonyNotes] 🔄 Switching viewId from', currentViewId, 'to', newViewId);
        currentViewId = newViewId;
      };
    })();

            if (window._ponyNotesSetViewId) {
              window._ponyNotesSetViewId(currentViewId);
              console.log('[Excalidraw iframe] 🔄 Updated localStorage viewId to:', currentViewId);
            }
            
            // 清空当前viewId的旧数据（localStorage隔离已经自动处理命名空间）
            localStorage.clear();
            console.log('[Excalidraw iframe] 🧹 Cleared old data for current viewId');
            
            // 如果有数据，写入localStorage
            if (data && (data.elements || data.appState || Object.keys(data).length > 1)) {
              // 确保数据格式正确
              const sceneData = {
                type: data.type || 'excalidraw',
                version: data.version || 2,
                source: data.source || 'https://excalidraw.com',
                elements: data.elements || [],
                appState: data.appState || {
                  viewBackgroundColor: '#ffffff',
                  currentItemStrokeColor: '#000000',
                  currentItemBackgroundColor: 'transparent',
                  currentItemFillStyle: 'hachure',
                  currentItemStrokeWidth: 1,
                  currentItemStrokeStyle: 'solid',
                  currentItemRoughness: 1,
                  currentItemOpacity: 100,
                  currentItemFontFamily: 1,
                  currentItemFontSize: 20,
                  currentItemTextAlign: 'left',
                  currentItemStartArrowhead: null,
                  currentItemEndArrowhead: 'arrow',
                  scrollX: 0,
                  scrollY: 0,
                  zoom: { value: 1 },
                  currentItemRoundness: 'round',
                  gridSize: null,
                  colorPalette: {}
                },
                files: data.files || {}
              };
              
              // 使用Excalidraw默认的key名（localStorage隔离会自动添加viewId前缀）
              const dataStr = JSON.stringify(sceneData);
              
              // 写入excalidraw-state键（会自动隔离到当前viewId）
              localStorage.setItem('excalidraw-state', dataStr);
              
              console.log('[Excalidraw iframe] ✅ Data loaded to localStorage, elements:', sceneData.elements.length);
              sendToParent('debug-log', {
                level: 'info',
                message: '[Excalidraw iframe] ✅ Data loaded: ' + sceneData.elements.length + ' elements, ' + dataStr.length + ' bytes'
              });
              
              // 触发storage事件，让Excalidraw检测到变化
              window.dispatchEvent(new StorageEvent('storage', {
                key: 'excalidraw-state',
                newValue: dataStr,
                oldValue: null,
                url: window.location.href,
                storageArea: localStorage
              }));
              
              // 强制Excalidraw重新加载（延迟执行，确保页面已准备好）
              setTimeout(function() {
                console.log('[Excalidraw iframe] 🔄 Triggering Excalidraw reload');
                window.dispatchEvent(new Event('storage'));
              }, 100);
            } else {
              console.log('[Excalidraw iframe] ⚠️ No valid data to load (empty or undefined)');
              sendToParent('debug-log', {
                level: 'warn',
                message: '[Excalidraw iframe] ⚠️ No valid data to load'
              });
            }
            
            // 更新快照
            lastDataSnapshot = localStorage.getItem('excalidraw-state');
            sendToParent('debug-log', {
              level: 'info',
              message: '[Excalidraw iframe] 📸 Snapshot updated, length: ' + (lastDataSnapshot ? lastDataSnapshot.length : 0)
            });
          } catch (e) {
            console.error('[Excalidraw iframe] ❌ Error loading data:', e);
            sendToParent('debug-log', {
              level: 'error',
              message: '[Excalidraw iframe] ❌ Error loading data: ' + e.message
            });
          }
        }
        
        // 处理获取数据请求
        function handleGetData() {
          try {
            console.log('[Excalidraw iframe] 🔍 Getting data...');
            sendToParent('debug-log', {
              level: 'info',
              message: '[Excalidraw iframe] 🔍 Attempting to get data'
            });
            
            // 策略1: 尝试从Excalidraw API获取场景数据（最可靠）
            let sceneData = null;
            
            // 检查是否有excalidrawAPI全局对象
            if (window.excalidrawAPI) {
              console.log('[Excalidraw iframe] ✅ Found window.excalidrawAPI');
              try {
                const elements = window.excalidrawAPI.getSceneElements();
                const appState = window.excalidrawAPI.getAppState();
                const files = window.excalidrawAPI.getFiles();
                
                sceneData = {
                  type: 'excalidraw',
                  version: 2,
                  source: 'https://excalidraw.com',
                  elements: elements || [],
                  appState: appState || {},
                  files: files || {},
                  viewId: currentViewId
                };
                
                console.log('[Excalidraw iframe] ✅ Got data from API, elements:', (elements || []).length);
                sendToParent('debug-log', {
                  level: 'info',
                  message: '[Excalidraw iframe] ✅ Got data from API, elements: ' + (elements || []).length
                });
              } catch (apiError) {
                console.error('[Excalidraw iframe] ❌ API error:', apiError);
                sendToParent('debug-log', {
                  level: 'error',
                  message: '[Excalidraw iframe] ❌ API error: ' + apiError.message
                });
              }
            }
            
            // 策略2: 如果API不可用，从localStorage读取
            if (!sceneData) {
              console.log('[Excalidraw iframe] ⚠️ API not available, trying localStorage');
              sendToParent('debug-log', {
                level: 'warn',
                message: '[Excalidraw iframe] ⚠️ API not available, trying localStorage'
              });
              
              const storageKey = 'excalidraw-state';
              const currentData = localStorage.getItem(storageKey);
              
              if (currentData) {
                sceneData = JSON.parse(currentData);
                if (currentViewId) {
                  sceneData.viewId = currentViewId;
                }
                
                // 同时保存到viewId专属的存储键（用于数据隔离）
                if (currentViewId) {
                  const viewStorageKey = getStorageKey(currentViewId);
                  localStorage.setItem(viewStorageKey, currentData);
                }
                
                console.log('[Excalidraw iframe] ✅ Got data from localStorage');
                sendToParent('debug-log', {
                  level: 'info',
                  message: '[Excalidraw iframe] ✅ Got data from localStorage'
                });
              }
            }
            
            if (sceneData) {
              sendToParent('excalidraw-data', sceneData);
              console.log('[Excalidraw iframe] ✅ Data sent to parent');
            } else {
              console.log('[Excalidraw iframe] ⚠️ No data found');
              sendToParent('excalidraw-data', null);
            }
          } catch (e) {
            console.error('[Excalidraw iframe] ❌ Error getting data:', e);
            sendToParent('debug-log', {
              level: 'error',
              message: '[Excalidraw iframe] ❌ Error getting data: ' + e.message
            });
            sendToParent('excalidraw-error', { message: e.message });
          }
        }
        
        // ========================================================================
        // 数据变更监听策略（多重保障）
        // ========================================================================
        
        // 策略1: 监听所有可能的 localStorage keys
        const possibleKeys = [
          'excalidraw-state',
          'excalidraw',
          'excalidraw-local-storage',
          'excalidraw-app-state'
        ];
        
        // 策略2: 使用轮询检测数据变化（优先使用API）
        let pollCount = 0;
        setInterval(function() {
          pollCount++;
          
          // 心跳日志（每10次轮询输出一次，避免日志过多）
          if (pollCount % 10 === 1) {
            sendToParent('debug-log', {
              level: 'info',
              message: '[Excalidraw iframe] ⏰ Polling tick #' + pollCount
            });
          }
          
          try {
            let dataSnapshot = null;
            
            // 检查 Excalidraw API 是否可用
            const hasAPI = !!window.excalidrawAPI;
            const hasGetSceneElements = hasAPI && typeof window.excalidrawAPI.getSceneElements === 'function';
            
            // 首次轮询时记录 API 状态
            if (pollCount === 1) {
              sendToParent('debug-log', {
                level: 'info',
                message: '[Excalidraw iframe] 🔍 API Status: hasAPI=' + hasAPI + ', hasGetSceneElements=' + hasGetSceneElements
              });
            }
            
            // 优先使用Excalidraw API获取数据
            if (hasAPI && hasGetSceneElements) {
              try {
                const elements = window.excalidrawAPI.getSceneElements();
                const appState = window.excalidrawAPI.getAppState();
                const files = window.excalidrawAPI.getFiles();
                
                // 创建完整的场景数据
                const sceneData = {
                  type: 'excalidraw',
                  version: 2,
                  source: 'https://excalidraw.com',
                  elements: elements || [],
                  appState: appState || {},
                  files: files || {},
                  viewId: currentViewId
                };
                
                // 转换为字符串用于对比
                dataSnapshot = JSON.stringify(sceneData);
                
                // 如果数据变化，发送到父窗口
                if (dataSnapshot !== lastDataSnapshot) {
                  lastDataSnapshot = dataSnapshot;
                  
                  sendToParent('debug-log', {
                    level: 'info',
                    message: '[Excalidraw iframe] 💾 Data changed (from API), elements: ' + (elements || []).length
                  });
                  
                  // 同时保存到viewId专属的localStorage（作为备份）
                  if (currentViewId) {
                    const viewStorageKey = getStorageKey(currentViewId);
                    localStorage.setItem(viewStorageKey, dataSnapshot);
                  }
                  
                  // 发送到父窗口
                  sendToParent('debug-log', {
                    level: 'info',
                    message: '[Excalidraw iframe] 📤 About to send excalidraw-change message to parent'
                  });
                  
                  sendToParent('excalidraw-change', sceneData);
                  
                  sendToParent('debug-log', {
                    level: 'info',
                    message: '[Excalidraw iframe] ✅ Data change notified (API), elements: ' + (elements || []).length
                  });
                  
                  return; // 数据已发送，跳过localStorage检查
                } else {
                  // 记录无变化的情况（每30次轮询记录一次）
                  if (pollCount % 30 === 0) {
                    sendToParent('debug-log', {
                      level: 'info',
                      message: '[Excalidraw iframe] ℹ️ No data change detected (poll #' + pollCount + ')'
                    });
                  }
                }
              } catch (apiError) {
                // API失败，继续尝试localStorage
                console.error('[Excalidraw iframe] API poll error:', apiError);
              }
            }
            
            // 回退：检查所有可能的localStorage keys
            for (let i = 0; i < possibleKeys.length; i++) {
              const key = possibleKeys[i];
              const currentData = localStorage.getItem(key);
              
              if (currentData && currentData !== lastDataSnapshot) {
                // 发送日志到父窗口（因为iframe的console.log不会输出到Flutter）
                sendToParent('debug-log', {
                  level: 'info',
                  message: '[Excalidraw iframe] 💾 Data changed detected in localStorage key: ' + key
                });
                
                lastDataSnapshot = currentData;
                
                try {
                  const parsedData = JSON.parse(currentData);
                  
                  // 添加viewId
                  if (currentViewId) {
                    parsedData.viewId = currentViewId;
                    
                    // 🔑 同时保存到viewId专属的存储键（用于数据隔离）
                    const viewStorageKey = getStorageKey(currentViewId);
                    localStorage.setItem(viewStorageKey, currentData);
                  }
                  
                  // 发送到父窗口
                  sendToParent('excalidraw-change', parsedData);
                  sendToParent('debug-log', {
                    level: 'info',
                    message: '[Excalidraw iframe] ✅ Data change notified (localStorage), keys: ' + Object.keys(parsedData).length
                  });
                } catch (parseError) {
                  sendToParent('debug-log', {
                    level: 'error',
                    message: '[Excalidraw iframe] ❌ Error parsing localStorage data: ' + parseError.message
                  });
                }
                
                break; // 找到变化后跳出循环
              }
            }
            
            // 策略3: 检查localStorage中所有以excalidraw开头的key
            const allKeys = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (key && (key.startsWith('excalidraw') || key.includes('excalidraw'))) {
                allKeys.push(key);
              }
            }
            
            // 如果发现新的key，记录下来
            if (allKeys.length > 0) {
              const keysStr = allKeys.join(', ');
              if (keysStr !== window._lastKeysStr) {
                window._lastKeysStr = keysStr;
                sendToParent('debug-log', {
                  level: 'info',
                  message: '[Excalidraw iframe] 🔍 Found localStorage keys: ' + keysStr
                });
              }
            }
          } catch (e) {
            sendToParent('debug-log', {
              level: 'error',
              message: '[Excalidraw iframe] ❌ Polling error: ' + e.message
            });
          }
        }, 2000); // 每2秒检查一次
        
        // 策略4: 监听 storage 事件（虽然同窗口不会触发，但iframe可能会）
        window.addEventListener('storage', function(e) {
          sendToParent('debug-log', {
            level: 'info',
            message: '[Excalidraw iframe] 🔔 Storage event: key=' + e.key + ', newValue length=' + (e.newValue ? e.newValue.length : 0)
          });
          
          if (e.key && e.key.includes('excalidraw') && e.newValue) {
            try {
              const parsedData = JSON.parse(e.newValue);
              if (currentViewId) {
                parsedData.viewId = currentViewId;
              }
              sendToParent('excalidraw-change', parsedData);
            } catch (err) {
              sendToParent('debug-log', {
                level: 'error',
                message: '[Excalidraw iframe] ❌ Storage event parse error: ' + err.message
              });
            }
          }
        });
        
        // 页面加载完成后通知父窗口
        // 使用 MutationObserver 监听 Excalidraw 元素的出现，而不是定时器
        (function() {
          let readySent = false;
          
          function checkAndSendReady() {
            if (readySent) return;
            
            const excalidrawEl = document.querySelector('.excalidraw');
            if (excalidrawEl) {
              readySent = true;
              console.log('[Excalidraw iframe] ✅ Excalidraw element found, sending ready signal');
              sendToParent('excalidraw-ready', { ready: true });
              return true;
            }
            return false;
          }
          
          // 立即检查一次（可能已经渲染好了）
          if (checkAndSendReady()) return;
          
          // 使用 MutationObserver 监听 DOM 变化
          const observer = new MutationObserver(function(mutations) {
            if (checkAndSendReady()) {
              observer.disconnect();
            }
          });
          
          // 监听 #root 元素的子树变化
          const rootEl = document.getElementById('root');
          if (rootEl) {
            observer.observe(rootEl, {
              childList: true,
              subtree: true
            });
            console.log('[Excalidraw iframe] 👁️ Started observing #root for Excalidraw element');
          } else {
            console.error('[Excalidraw iframe] ❌ #root element not found');
          }
          
          // 备用：10秒后仍未找到则报错
          setTimeout(function() {
            if (!readySent) {
              observer.disconnect();
              console.error('[Excalidraw iframe] ❌ Timeout: Excalidraw element not found after 10 seconds');
              sendToParent('debug-log', {
                level: 'error',
                message: 'Excalidraw element not found after 10 seconds'
              });
            }
          }, 10000);
        })();
        
        console.log('[Excalidraw iframe] ✅ Data management script fully loaded');
      })();
    </script>
  </body>
</html>
