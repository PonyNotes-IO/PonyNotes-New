    }
    .excalidraw button {
      color: #ffffff !important;
    }
    .excalidraw button:hover {
      background-color: #34495e !important;
    }
    .excalidraw .dropdown-menu,
    .excalidraw .context-menu {
      background-color: #2c3e50 !important;
      border: 1px solid #34495e !important;
    }
    .excalidraw .dropdown-menu-item,
    .excalidraw .context-menu-item {
      color: #ffffff !important;
    }
    .excalidraw .dropdown-menu-item:hover,
    .excalidraw .context-menu-item:hover {
      background-color: #34495e !important;
    }
    .excalidraw .sidebar {
      background-color: #2c3e50 !important;
      color: #ffffff !important;
    }
    .excalidraw .separator {
      background-color: #4a5f7f !important;
    }
    .excalidraw ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .excalidraw ::-webkit-scrollbar-track {
      background: #34495e;
    }
    .excalidraw ::-webkit-scrollbar-thumb {
      background: #4a5f7f;
      border-radius: 4px;
    }
    .excalidraw ::-webkit-scrollbar-thumb:hover {
      background: #5a6f8f;
    }

          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        }

        function getTheme() {
          const theme = window.localStorage.getItem("excalidraw-theme");

          if (theme && theme === "system") {
            return window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          } else {
            return theme || "light";
          }
        }

        setTheme(getTheme());
      } catch (e) {
        console.error("Error setting dark mode", e);

      // PonyNotes Debug: iframe内部状态报告
      (function() {
        console.log('[Excalidraw iframe] Script started');
        
        function reportToParent(message) {
          try {
            if (window.parent && window.parent !== window) {
              window.parent.postMessage({
                source: 'excalidraw-iframe',
                message: message
              }, '*');
            }
          } catch (e) {
            console.error('[Excalidraw iframe] postMessage failed:', e);
          }
        }
        
        // 立即报告iframe已加载
        reportToParent('iframe script loaded');
        console.log('[Excalidraw iframe] Document ready state:', document.readyState);
        reportToParent('document readyState: ' + document.readyState);
        
        // DOM加载完成时报告
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            console.log('[Excalidraw iframe] DOMContentLoaded');
            reportToParent('DOMContentLoaded');
            
            const root = document.getElementById('root');
            reportToParent('#root element: ' + (root ? 'found' : 'NOT FOUND'));
            if (root) {
              reportToParent('#root children count: ' + root.children.length);
            }
          });
        } else {
          console.log('[Excalidraw iframe] DOM already loaded');
          reportToParent('DOM already loaded');
          
          const root = document.getElementById('root');

          if (root) {
            reportToParent('#root children count: ' + root.children.length);
          }
        }
        
        // 页面完全加载后检查Excalidraw元素

          console.log('[Excalidraw iframe] Window loaded');
