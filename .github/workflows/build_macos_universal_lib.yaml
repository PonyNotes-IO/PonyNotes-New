name: Build macOS Universal Library

on:
  push:
    branches:
      - "main"
      - "develop"
      - "release/*"
      - "!backup/**"
    paths:
      - ".github/workflows/build_macos_universal_lib.yaml"
      - "frontend/rust-lib/**"
      - "scripts/build_universal_dart_ffi.sh"
      - "frontend/scripts/build_universal_dart_ffi.sh"

  pull_request:
    branches:
      - "main"
      - "develop"
      - "release/*"
    paths:
      - ".github/workflows/build_macos_universal_lib.yaml"
      - "frontend/rust-lib/**"
      - "scripts/build_universal_dart_ffi.sh"
      - "frontend/scripts/build_universal_dart_ffi.sh"

  workflow_dispatch:
    inputs:
      commit_changes:
        description: '是否提交生成的universal库到仓库'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.85.0"
  CARGO_MAKE_VERSION: "0.37.18"

jobs:
  build-universal-lib:
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/heads/backup/') }}
    runs-on: macos-latest
    name: Build macOS Universal Library (x86_64 + arm64)

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          override: true
          profile: minimal

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make@${{ env.CARGO_MAKE_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-universal
          workspaces: |
            frontend/rust-lib
          cache-all-crates: true

      - name: Install Rust targets for universal binary
        run: |
          echo "Installing Rust targets for macOS universal binary..."
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Verify Rust targets
        run: |
          echo "Available Rust targets:"
          rustup target list --installed

      - name: Build universal dart-ffi library
        run: |
          echo "Building universal libdart_ffi.a for macOS..."
          chmod +x frontend/scripts/build_universal_dart_ffi.sh
          ./frontend/scripts/build_universal_dart_ffi.sh

      - name: Verify universal library
        run: |
          echo "Verifying universal library..."
          ls -la frontend/appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a
          lipo -info frontend/appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a
          lipo -detailed_info frontend/appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a

      - name: Upload universal library as artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-libdart_ffi-${{ github.run_id }}
          path: frontend/appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a
          retention-days: 30

      - name: Commit universal library to repository (optional)
        if: github.event.inputs.commit_changes == 'true' || (github.event_name == 'push' && contains(github.ref, 'main'))
        run: |
          echo "Checking if universal library has changed..."
          if git diff --quiet frontend/appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a; then
            echo "Universal library is up to date, no changes to commit."
          else
            echo "Universal library has changed, committing..."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add frontend/appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a
            git commit -m "feat: 更新 macOS universal libdart_ffi.a

- 包含 x86_64 和 arm64 架构支持
- 解决 macOS 架构不匹配问题
- 支持 Intel 和 Apple Silicon Mac

Generated by CI workflow: build_macos_universal_lib" || echo "No changes to commit"
            git push
          fi

      - name: Test Flutter build with universal library
        run: |
          echo "Testing Flutter build compatibility..."
          cd frontend

          # Install Flutter
          if ! command -v flutter &> /dev/null; then
            echo "Installing Flutter..."
            git clone https://github.com/flutter/flutter.git -b stable --depth 1 $HOME/flutter
            export PATH="$PATH:$HOME/flutter/bin"
          fi

          flutter --version
          flutter config --enable-macos-desktop

          # Test pub get
          cargo make pub_get

          # Test if the universal library can be linked (basic check)
          echo "Testing library linkage..."
          if [ -f "appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a" ]; then
            echo "✅ Universal library exists"
            lipo -info appflowy_flutter/packages/appflowy_backend/macos/libdart_ffi.a
          else
            echo "❌ Universal library not found"
            exit 1
          fi
